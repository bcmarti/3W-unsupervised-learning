name: moment-3w
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10

  # PyTorch 2.5.1 — newest version compatible with CUDA 11.8 driver
  - pytorch=2.5.1
  - torchvision=0.20.1
  - torchaudio=2.5.1
  - pytorch-cuda=11.8

  # pandas 2.0.x — highest version compatible with numpy 1.25.2 (momentfm's pin)
  - pandas=2.0.*
  - pyarrow>=14.0
  - scikit-learn>=1.3
  - matplotlib>=3.7

  - pip
  - pip:
      - momentfm==0.1.4
      - huggingface-hub>=0.22
      - transformers==4.33.3
      - einops>=0.7
      - accelerate>=0.27
      - timm
      - reformer-pytorch