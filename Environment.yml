name: moment-3w
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.11

  # PyTorch — remove pytorch-cuda=12.1 and add cpuonly if you don't have a GPU
  - pytorch>=2.2
  - torchvision
  - pytorch-cuda=12.1

  # Pin pandas to 2.0.x — fully compatible with numpy 1.25.2
  - pandas=2.0.*
  - pyarrow>=14.0
  - scikit-learn>=1.3
  - matplotlib>=3.7

  - pip
  - pip:
      - momentfm==0.1.4        # brings numpy==1.25.2 — accepted by pandas 2.0.x
      - huggingface-hub>=0.22
      - transformers==4.33.3
      - einops>=0.7
      - accelerate>=0.27
      - timm
      - reformer-pytorch